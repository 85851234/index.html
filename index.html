<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIVALS | 班級秘密投票系統</title>
    <style>
        body { background-color: #0a0a0c; color: #ffffff; font-family: "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: linear-gradient(145deg, #16161a, #0d0d0f); padding: 30px; border-radius: 5px; width: 90%; max-width: 380px; border-left: 5px solid #ff3e3e; box-shadow: 10px 10px 0px rgba(255, 62, 62, 0.1); text-align: center; }
        h2 { color: #ff3e3e; text-transform: uppercase; font-style: italic; letter-spacing: 2px; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        label { display: block; text-align: left; margin-top: 15px; color: #888; font-size: 13px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; background: #1f1f23; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; outline: none; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #ff3e3e; color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 25px; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #fff; color: #ff3e3e; transform: skewX(-5deg); }
        #admin-panel { display: none; margin-top: 30px; text-align: left; background: #111; padding: 15px; border: 1px dashed #ff3e3e; font-size: 14px; }
        .res-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 5px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>VOTE FOR MVP</h2>
    
    <label>Enter Your Seat | 輸入你的座號</label>
    <input type="text" id="seat" placeholder="例如：12">
    
    <label>🌸 Select Queen | 提名班花 (限 15-27 號)</label>
    <select id="girl"><option value="">-- 請選擇女生 --</option></select>

    <label>🌿 Select King | 提名班草 (限 1-14 號)</label>
    <select id="boy"><option value="">-- 請選擇男生 --</option></select>

    <button onclick="handleVote()">Confirm Vote | 確認送出</button>

    <div id="admin-panel">
        <h3 style="color: #ff3e3e; margin-top: 0;">LIVE RESULTS</h3>
        <div id="results"></div>
        <button onclick="clearData()" style="background:#333; font-size:12px; margin-top:10px;">RESET ALL DATA</button>
    </div>
</div>

<script>
    const ADMIN_PW = "rivals888"; 
    const classList = {
        "1": "王辰洧", "2": "王建凱", "3": "吳承諺", "4": "李昌霖", "5": "周裕宸", 
        "6": "林炘楷", "7": "林祐丞", "8": "林靖傑", "9": "林駿騰", "10": "張祐瑋", 
        "11": "陳一揚", "12": "黃詠呈", "13": "曾丞翰", "14": "楊宗翰", 
        "15": "王于緁", "16": "王姵云", "17": "吳昀潼", "18": "吳奕璇", "19": "林雨辰", 
        "20": "林思彤", "21": "張勻瑄", "22": "陳又瑜", "23": "陳羽亭", "24": "陳珮欣", 
        "25": "詹胥亭亞", "26": "蔡雨恬", "27": "賴榆芹"
    };

    const girlSelect = document.getElementById('girl');
    const boySelect = document.getElementById('boy');

    Object.keys(classList).forEach(num => {
        const opt = new Option(`${num}號 ${classList[num]}`, classList[num]);
        if (parseInt(num) <= 14) boySelect.add(opt);
        else girlSelect.add(opt);
    });

    function handleVote() {
        const seat = document.getElementById('seat').value.trim();
        const girl = document.getElementById('girl').value;
        const boy = document.getElementById('boy').value;

        if (seat === ADMIN_PW) {
            showResults();
            return;
        }

        if (!seat || !girl || !boy) {
            alert("請填寫座號並選好人選喔！");
            return;
        }

        let votes = JSON.parse(localStorage.getItem('v_data') || "[]");
        if (votes.some(v => v.s === seat)) {
            alert("這個座號已經投過票了！");
            return;
        }

        votes.push({ s: seat, g: girl, b: boy });
        localStorage.setItem('v_data', JSON.stringify(votes));
        alert("SUCCESS! 投票已完成。");
        location.reload();
    }

    function showResults() {
        const votes = JSON.parse(localStorage.getItem('v_data') || "[]");
        const resDiv = document.getElementById('results');
        let gStat = {}, bStat = {};

        votes.forEach(v => {
            gStat[v.g] = (gStat[v.g] || 0) + 1;
            bStat[v.b] = (bStat[v.b] || 0) + 1;
        });

        let html = "<strong>[ 班花統計 ]</strong><br>";
        Object.entries(gStat).sort((a,b)=>b[1]-a[1]).forEach(([n,c]) => {
            html += `<div class="res-item"><span>${n}</span><span>${c} 票</span></div>`;
        });
        html += "<br><strong>[ 班草統計 ]</strong><br>";
        Object.entries(bStat).sort((a,b)=>b[1]-a[1]).forEach(([n,c]) => {
            html += `<div class="res-item"><span>${n}</span><span>${c} 票</span></div>`;
        });

        resDiv.innerHTML = html || "目前尚無投票紀錄";
        document.getElementById('admin-panel').style.display = 'block';
    }

    function clearData() {
        if(confirm("確定要清空這台電腦上的投票數據嗎？")) { localStorage.removeItem('v_data'); location.reload(); }
    }
</script>
</body>
</html>
